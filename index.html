<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aurora Command Center 🌌</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}


header{
text-align:center;
padding:70px 20px;
background:linear-gradient(#0008,#020617);
}


h1{
font-size:55px;
color:#7ffcff;
text-shadow:0 0 30px cyan;
}


.subtitle{
font-size:22px;
}


.container{
max-width:1200px;
margin:auto;
padding:30px;
}


.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;

}


.card{

background:#0f172a;
padding:25px;
border-radius:25px;
box-shadow:0 0 30px #00ffff22;

}


.card h2{

color:#7ffcff;

}



.radar{

width:280px;
height:280px;
border-radius:50%;
margin:auto;

background:
radial-gradient(circle,
transparent 20%,
#00ffff22 21%,
transparent 22%,
#00ffff22 40%,
transparent 41%,
#00ffff22 60%,
transparent 61%);

border:3px solid cyan;

position:relative;

overflow:hidden;

}


.radar:after{

content:"";

position:absolute;

width:50%;
height:50%;

background:linear-gradient(45deg,transparent,#00ffcc);

animation:scan 2s infinite;

transform-origin:100% 100%;

}


@keyframes scan{

to{
transform:rotate(360deg);
}

}



.aurora{

height:150px;

background:linear-gradient(
90deg,
#00ff99,
#8b5cf6,
#00eaff,
#00ff99
);

filter:blur(25px);

animation:move 5s infinite alternate;

}



@keyframes move{

from{
transform:translateX(-50px);
}

to{
transform:translateX(50px);
}

}


button,a{

background:#00eaff;
color:black;
padding:15px 25px;
border-radius:30px;
text-decoration:none;
border:0;
font-weight:bold;

}


.progress{

height:25px;
background:#111;
border-radius:20px;
overflow:hidden;

}


.bar{

height:100%;
width:75%;
background:#00ff99;

}



footer{

padding:30px;
text-align:center;

}


</style>

</head>


<body>


<canvas id="stars"></canvas>


<header>

<h1>🌌 AURORA COMMAND CENTER</h1>

<p class="subtitle">
Centrum zorzy polarnej, Słońca i Wszechświata
</p>

<br>

<a href="https://www.swpc.noaa.gov/" target="_blank">
☀️ Dane kosmiczne
</a>


</header>



<div class="container">


<div class="grid">
